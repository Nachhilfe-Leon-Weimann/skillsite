name: Release
run-name: Release (${{ inputs.version != '' && inputs.version || inputs.bump }})

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (ignored when an explicit version is given)"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true
      version:
        description: "Explicit version without leading v (optional, overrides bump)"
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump version and tag
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Create release bot token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"

      - name: Configure git
        run: |
          git config user.name "skillsite-release-bot[bot]"
          git config user.email "305108749+skillsite-release-bot[bot]@users.noreply.github.com"

      - name: Bump version, commit and tag
        id: bump
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            npm version "${INPUT_VERSION#v}" --no-git-tag-version >/dev/null
          else
            npm version "${INPUT_BUMP}" --no-git-tag-version >/dev/null
          fi
          version="$(node -p "require('./package.json').version")"

          git add package.json
          git commit -m "chore(release): v${version}"
          git tag "v${version}"
          git push --atomic origin main "v${version}"

          {
            printf 'version=%s\n' "${version}"
            printf 'sha=%s\n' "$(git rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build and push image
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Resolve image tags
        id: image
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA: ${{ needs.release.outputs.sha }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${RELEASE_SHA:0:12}"
          {
            printf 'tags<<EOF\n'
            printf '%s:v%s\n' "${image}" "${RELEASE_VERSION}"
            printf '%s:sha-%s\n' "${image}" "${short_sha}"
            printf '%s:latest\n' "${image}"
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub release
    needs: [release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA: ${{ needs.release.outputs.sha }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}:v${RELEASE_VERSION}"
          notes="Container image:"$'\n\n'"\`${image}\`"
          gh release create "v${RELEASE_VERSION}" \
            --target "${RELEASE_SHA}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --notes "${notes}"

  deploy:
    name: Trigger Dokploy deploy
    needs: [release, build, github-release]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          echo "Triggering Dokploy redeploy for v${RELEASE_VERSION}"
          curl --fail --show-error --silent \
            --request POST \
            "${DEPLOY_WEBHOOK_URL}"
