name: Release
run-name: Release (${{ inputs.version != '' && inputs.version || inputs.bump }})

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump (ignored when an explicit version is given)"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true
      version:
        description: "Explicit version without leading v (optional, overrides bump)"
        type: string
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Bump version and tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "26"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and tag
        id: bump
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_VERSION}" ]]; then
            npm version "${INPUT_VERSION#v}" --no-git-tag-version >/dev/null
          else
            npm version "${INPUT_BUMP}" --no-git-tag-version >/dev/null
          fi
          version="$(node -p "require('./package.json').version")"

          git add package.json
          git commit -m "chore(release): v${version}"
          git tag "v${version}"
          git push origin main
          git push origin "v${version}"

          {
            printf 'version=%s\n' "${version}"
            printf 'sha=%s\n' "$(git rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build and push image
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}

      - name: Resolve image tags
        id: image
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA: ${{ needs.release.outputs.sha }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          short_sha="${RELEASE_SHA:0:12}"
          {
            printf 'tags<<EOF\n'
            printf '%s:v%s\n' "${image}" "${RELEASE_VERSION}"
            printf '%s:sha-%s\n' "${image}" "${short_sha}"
            printf '%s:latest\n' "${image}"
            printf 'EOF\n'
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub release
    needs: [release, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.sha }}
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA: ${{ needs.release.outputs.sha }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}:v${RELEASE_VERSION}"
          notes="Container image:"$'\n\n'"\`${image}\`"
          gh release create "v${RELEASE_VERSION}" \
            --target "${RELEASE_SHA}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --notes "${notes}"

  deploy:
    name: Trigger Dokploy deploy
    needs: [release, build, github-release]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          echo "Triggering Dokploy redeploy for v${RELEASE_VERSION}"
          curl --fail --show-error --silent \
            --request POST \
            "${DEPLOY_WEBHOOK_URL}"
